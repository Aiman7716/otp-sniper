<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP SNIPER | Eng. Ayman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --dark: #020617; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .top-nav { background: #0f172a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .brand { font-size: 1.5rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .main-content { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .sniper-box { width: 100%; max-width: 500px; background: var(--card); border-radius: 25px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); text-align: center; }
        .radar { background: #000; border: 1px solid var(--primary); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        #mailText { font-size: 1.1rem; color: var(--primary); font-weight: bold; word-break: break-all; min-height: 1.5em; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; color: white; }
        .download-btn { background: rgba(251,191,36,0.1); color: var(--primary); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; font-size: 0.75rem; margin-top: 15px; cursor: pointer; display: inline-block; }
        #messagesContainer { margin-top: 25px; text-align: right; }
        .msg-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--primary); }
        footer { background: #0f172a; padding: 20px; text-align: center; border-top: 1px solid rgba(251,191,36,0.1); margin-top: auto; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="brand"><i class="fas fa-crosshairs"></i> OTP SNIPER</div>
        <div style="font-size: 0.7rem; background: var(--primary); color: #000; padding: 4px 10px; border-radius: 5px; font-weight: bold;">PRO EDITION</div>
    </header>

    <div class="main-content">
        <div class="sniper-box">
            <div class="radar">
                <div id="mailText">جاري تهيئة الرادار...</div>
                <div class="download-btn" onclick="downloadAccessData()">
                    <i class="fas fa-file-download"></i> تحميل بيانات الوصول
                </div>
            </div>

            <div class="btn-group">
                <button class="btn" style="background:#334155; border:1px solid var(--primary);" onclick="copyTxt()">نسخ العنوان</button>
                <button class="btn" style="background:#ef4444;" onclick="confirmNew()">هدف جديد</button>
                <button id="refreshBtn" class="btn" style="grid-column: span 2; background:#10b981;" onclick="fetchMessages()">تحديث الرادار</button>
            </div>

            <div id="messagesContainer"></div>
        </div>
    </div>

    <footer>
        <div style="font-size: 0.85rem; opacity: 0.8;">
            تم التطوير بواسطة <span style="color: var(--primary); font-weight: bold;">م. أيمن الحميري</span><br>
            <i class="fas fa-envelope"></i> للتواصل: kebriay2030@gmail.com
        </div>
    </footer>

    <script>
        let address = ""; let token = ""; const password = "AymanElite123";

        async function generateNew() {
            document.getElementById('mailText').innerText = "قنص عنوان جديد...";
            try {
                const domRes = await fetch('https://api.mail.tm/domains');
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                const user = Math.random().toString(36).substring(2, 10);
                address = `${user}@${domain}`;

                await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                });

                const tRes = await fetch('https://api.mail.tm/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                });
                const tData = await tRes.json();
                token = tData.token;

                document.getElementById('mailText').innerText = address;
                document.getElementById('messagesContainer').innerHTML = '<p style="text-align:center; opacity:0.3;">الرادار نظيف..</p>';
            } catch (e) { document.getElementById('mailText').innerText = "خطأ في السيرفر"; }
        }

        async function fetchMessages() {
            if (!token) return;
            const btn = document.getElementById('refreshBtn');
            btn.innerText = "جاري المسح...";
            try {
                const res = await fetch('https://api.mail.tm/messages', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const msgs = data['hydra:member'];
                const container = document.getElementById('messagesContainer');
                container.innerHTML = msgs.length ? "" : '<p style="text-align:center; opacity:0.3;">لا توجد رسائل</p>';
                msgs.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'msg-item';
                    div.innerHTML = `<strong>من: ${m.from.address}</strong><br><small>${m.subject || 'بدون موضوع'}</small>`;
                    container.appendChild(div);
                });
            } catch (e) {}
            btn.innerText = "تحديث الرادار";
        }

        function copyTxt() { navigator.clipboard.writeText(address); alert("تم النسخ 🎯"); }
        function downloadAccessData() {
            const content = `OTP SNIPER DATA\nEmail: ${address}\nToken: ${token}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `sniper_data.txt`;
            a.click();
        }
        function confirmNew() { if(confirm("تغيير الهدف؟")) generateNew(); }

        window.onload = generateNew;
    </script>
</body>
</html>
